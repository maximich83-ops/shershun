<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Products</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            text-align: center;
        }

        .products {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 15px;
            padding: 20px;
        }

        .product {
            width: 150px; /* фіксована ширина */
            border: 2px solid #ccc;
            border-radius: 10px;
            padding: 10px;
            box-sizing: border-box;
        }

        .product img {
            width: 60px;
            height: 60px;
        }

        .product p {
            margin-top: 10px;
            font-size: 16px;
        }

        .footer {
            margin-top: 20px;
            font-style: italic;
        }
    </style>
</head>

<body>

<h2>Products</h2>

<div class="products">

    <div class="product">
        <img src="https://cdn-icons-png.flaticon.com/512/1046/1046784.png">
        <p>Apple</p>
    </div>

    <div class="product">
        <img src="https://cdn-icons-png.flaticon.com/512/1046/1046790.png">
        <p>Banana</p>
    </div>

    <div class="product">
        <img src="https://cdn-icons-png.flaticon.com/512/1046/1046786.png">
        <p>Orange</p>
    </div>

    <div class="product">
        <img src="https://cdn-icons-png.flaticon.com/512/1046/1046785.png">
        <p>Grapes</p>
    </div>

    <div class="product">
        <img src="https://cdn-icons-png.flaticon.com/512/1046/1046791.png">
        <p>Watermelon</p>
    </div>

    <div class="product">
        <img src="https://cdn-icons-png.flaticon.com/512/1046/1046793.png">
        <p>Pineapple</p>
    </div>

</div>

<div class="footer">
    that's all
</div>

</body>
</html>
