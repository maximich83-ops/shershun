<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Блоки текст + картинка</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .block {
            display: flex;
            height: 200px; /* фіксована висота */
            margin: 20px;
            position: relative;
            overflow: hidden;
        }

        .text, .image {
            width: 50%;
        }

        .text {
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            background: #f5f5f5;
        }

        .image {
            overflow: hidden;
        }

        .image img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 1s;
        }

        /* Напівпрозора плашка */
        .overlay {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0);
            transition: background 0.3s;
            pointer-events: none;
        }

        /* Hover ефекти */
        .block:hover .overlay {
            background: rgba(0,0,0,0.5);
        }

        .block:hover img {
            transform: scale(1.2);
        }
    </style>
</head>
<body>

<div class="block">
    <div class="text">Текст 1</div>
    <div class="image">
        <img src="https://picsum.photos/400/300?1" alt="">
    </div>
    <div class="overlay"></div>
</div>

<div class="block">
    <div class="text">Текст 2</div>
    <div class="image">
        <img src="https://picsum.photos/400/300?2" alt="">
    </div>
    <div class="overlay"></div>
</div>

<div class="block">
    <div class="text">Текст 3</div>
    <div class="image">
        <img src="https://picsum.photos/400/300?3" alt="">
    </div>
    <div class="overlay"></div>
</div>

</body>
</html>
