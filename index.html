<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Плани підписки</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
    background-color: #f4f4f4;
}

/* КОНТЕЙНЕР */
.container {
    display: flex;
    justify-content: center;
    gap: 20px;
    padding: 50px;
}

/* КАРТКА */
.plan {
    width: 200px;
    height: 300px;
    background-color: white;
    border-radius: 10px;
    text-align: center;
    padding: 20px;
    box-shadow: 0 0 10px rgba(0,0,0,0.1);

    transition: transform 1s;
}

/* HOVER */
.plan:hover {
    transform: scale(1.2);
}

/* СТИЛІ */
.plan h2 {
    margin: 10px 0;
}

.price {
    font-size: 24px;
    margin: 15px 0;
    color: #333;
}

.plan ul {
    list-style: none;
    padding: 0;
}

.plan li {
    margin: 10px 0;
}

/* КНОПКА */
button {
    margin-top: 15px;
    padding: 10px 15px;
    border: none;
    background-color: #333;
    color: white;
    cursor: pointer;
    border-radius: 5px;
}

button:hover {
    background-color: #555;
}
</style>

</head>
<body>

<div class="container">
    
    <div class="plan">
        <h2>Basic</h2>
        <div class="price">$10</div>
        <ul>
            <li>1 користувач</li>
            <li>10GB пам’яті</li>
            <li>Підтримка</li>
        </ul>
        <button>Обрати</button>
    </div>

    <div class="plan">
        <h2>Standard</h2>
        <div class="price">$20</div>
        <ul>
            <li>5 користувачів</li>
            <li>50GB пам’яті</li>
            <li>Підтримка</li>
        </ul>
        <button>Обрати</button>
    </div>

    <div class="plan">
        <h2>Premium</h2>
        <div class="price">$30</div>
        <ul>
            <li>10 користувачів</li>
            <li>100GB пам’яті</li>
            <li>Преміум підтримка</li>
        </ul>
        <button>Обрати</button>
    </div>

</div>

</body>
</html>
