<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Vertical Menu</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f4f4f4;
        }

        .menu {
            width: 220px;
            background-color: #2c3e50;
            height: 100vh;
        }

        .menu-item {
            display: flex;
            align-items: center;
            padding: 15px;
            color: white;
            cursor: pointer;
            transition: 0.3s;
        }

        .menu-item img {
            width: 24px;
            margin-right: 10px;
        }

        .menu-item:hover {
            background-color: #1a252f; /* темніше при наведенні */
        }
    </style>
</head>
<body>

<div class="menu">
    <div class="menu-item">
        <img src="https://img.icons8.com/ios-filled/50/home.png">
        <span>Home</span>
    </div>

    <div class="menu-item">
        <img src="https://img.icons8.com/ios-filled/50/user.png">
        <span>Profile</span>
    </div>

    <div class="menu-item">
        <img src="https://img.icons8.com/ios-filled/50/settings.png">
        <span>Settings</span>
    </div>

    <div class="menu-item">
        <img src="https://img.icons8.com/ios-filled/50/security-checked.png">
        <span>Security</span>
    </div>
</div>

</body>
</html>
