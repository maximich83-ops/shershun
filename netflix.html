<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Streaming UI</title>
<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}


.header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: #111;
    color: white;
    padding: 15px 30px;
}

.logo {
    font-size: 24px;
    font-weight: bold;
}

.menu {
    display: flex;
    gap: 20px;
}

.menu a {
    color: white;
    text-decoration: none;
}


.container {
    display: flex;
}


.sidebar {
    width: 200px;
    background: #222;
    color: white;
    display: flex;
    flex-direction: column;
    padding: 20px;
    gap: 15px;
}

.sidebar a {
    color: white;
    text-decoration: none;
}


.content {
    flex: 1;
    padding: 20px;
}


.cards {
    display: flex;
    flex-wrap: wrap;
    gap: 20px;
}

.card {
    flex: 1 1 calc(25% - 20px); 
    background: #eee;
    height: 150px;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: 0.3s;
}


.card:hover {
    transform: scale(1.05);
    background: #ddd;
}


@media (max-width: 900px) {
    .card {
        flex: 1 1 calc(50% - 20px); 
    }
}

@media (max-width: 600px) {
    .container {
        flex-direction: column;
    }

    .sidebar {
        flex-direction: row;
        width: 100%;
        justify-content: space-around;
    }

    .card {
        flex: 1 1 100%; 
    }
}
</style>
</head>

<body>


<div class="header">
    <div class="logo">MyStream</div>
    <div class="menu">
        <a href="#">Головна</a>
        <a href="#">Фільми</a>
        <a href="#">Серіали</a>
        <a href="#">Контакти</a>
    </div>
</div>


<div class="container">

    
    <div class="sidebar">
        <a href="#">Популярне</a>
        <a href="#">Новинки</a>
        <a href="#">Топ</a>
        <a href="#">Обране</a>
    </div>

    
    <div class="content">
        <div class="cards">
            <div class="card">1</div>
            <div class="card">2</div>
            <div class="card">3</div>
            <div class="card">4</div>
            <div class="card">5</div>
            <div class="card">6</div>
            <div class="card">7</div>
            <div class="card">8</div>
        </div>
    </div>

</div>

</body>
</html>
