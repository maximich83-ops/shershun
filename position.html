<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<title>Sidebar Menu</title>

<style>
body {
    margin: 0;
    font-family: Arial, sans-serif;
}

/* БІЧНЕ МЕНЮ */
.sidebar {
    position: fixed;
    top: 0;
    left: 0;
    width: 60px; /* початковий стан */
    height: 100vh;
    background-color: #333;
    overflow: hidden;
    transition: width 1s;
    z-index: 1000;
}

/* РОЗКРИТТЯ */
.sidebar:hover {
    width: 220px;
}

/* СПИСОК */
.sidebar ul {
    list-style: none;
    padding: 0;
    margin: 0;
}

/* ПУНКТИ */
.sidebar li {
    color: white;
    padding: 15px;
    cursor: pointer;
    white-space: nowrap;
}

/* HOVER НА ПУНКТАХ */
.sidebar li:hover {
    background-color: #555;
}

/* КОНТЕНТ */
.content {
    margin-left: 70px;
    padding: 20px;
}

/* ДЛЯ ПРОКРУТКИ */
.big-text {
    height: 2000px;
}
</style>

</head>
<body>

<div class="sidebar">
    <ul>
        <li>🏠 Головна</li>
        <li>👤 Профіль</li>
        <li>📩 Повідомлення</li>
        <li>⚙️ Налаштування</li>
        <li>🚪 Вийти</li>
    </ul>
</div>

<div class="content">
    <h1>Контент сторінки</h1>
    <p>Прокрути сторінку вниз — меню залишиться на місці.</p>
    <div class="big-text"></div>
</div>

</body>
</html>
