<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Стулки</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #eee;
        }

        .container {
            position: relative;
            width: 300px;
            height: 200px;
            overflow: hidden;
        }

        .text {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 20px;
            background: white;
            z-index: 1;
        }

        .flap {
            position: absolute;
            width: 50%;
            height: 100%;
            background: #3498db;
            z-index: 2;
        }

        .left {
            left: 0;
            transform-origin: left;
        }

        .right {
            right: 0;
            transform-origin: right;
        }

        /* Анімація при наведенні */
        .container:hover .left {
            transform: rotateY(-90deg);
            transition: 2s;
        }

        .container:hover .right {
            transform: rotateY(90deg);
            transition: 2s;
        }

        /* Повернення назад — миттєво */
        .left,
        .right {
            transition: 0s;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="text">Прихований текст 👀</div>
    <div class="flap left"></div>
    <div class="flap right"></div>
</div>

</body>
</html>
