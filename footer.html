<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Footer</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
        }

        .footer {
            background-color: #2c3e50;
            color: white;
            padding: 30px;
        }

        .footer-container {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        /* Колонки меню */
        .footer-column {
            display: flex;
            flex-direction: column;
        }

        .footer-column a {
            color: white;
            text-decoration: none;
            margin-bottom: 10px;
            transition: 0.3s;
        }

        /* Підкреслення при наведенні */
        .footer-column a:hover {
            text-decoration: underline;
        }

        /* Соц іконки */
        .social {
            display: flex;
            gap: 15px;
        }

        .icon {
            width: 40px;
            height: 40px;
            background-size: cover;
            transition: 0.3s;
        }

        /* Чорно-білі іконки */
        .facebook {
            background-image: url("https://img.icons8.com/ios/50/facebook.png");
        }

        .instagram {
            background-image: url("https://img.icons8.com/ios/50/instagram-new.png");
        }

        .twitter {
            background-image: url("https://img.icons8.com/ios/50/twitter.png");
        }

        /* Кольорові при наведенні */
        .facebook:hover {
            background-image: url("https://img.icons8.com/color/48/facebook.png");
        }

        .instagram:hover {
            background-image: url("https://img.icons8.com/color/48/instagram-new.png");
        }

        .twitter:hover {
            background-image: url("https://img.icons8.com/color/48/twitter.png");
        }
    </style>
</head>
<body>

<footer class="footer">
    <div class="footer-container">

        <!-- Колонка 1 -->
        <div class="footer-column">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Services</a>
        </div>

        <!-- Колонка 2 -->
        <div class="footer-column">
            <a href="#">Contacts</a>
            <a href="#">Support</a>
            <a href="#">Privacy</a>
        </div>

        <!-- Соц мережі -->
        <div class="social">
            <div class="icon facebook"></div>
            <div class="icon instagram"></div>
            <div class="icon twitter"></div>
        </div>

    </div>
</footer>

</body>
</html>
