<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Годинник</title>
    <style>
        body {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            background: #f0f0f0;
        }

        .clock {
            width: 200px;
            height: 200px;
            border: 8px solid black;
            border-radius: 50%;
            position: relative;
        }

        .hand {
            position: absolute;
            bottom: 50%;
            left: 50%;
            transform-origin: bottom;
            transform: translateX(-50%);
        }

        .hour {
            width: 6px;
            height: 50px;
            background: black;
            animation: rotateHour 60s linear infinite;
        }

        .minute {
            width: 4px;
            height: 70px;
            background: red;
            animation: rotateMinute 10s linear infinite;
        }

        .center {
            width: 10px;
            height: 10px;
            background: black;
            border-radius: 50%;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
        }

        @keyframes rotateHour {
            from {
                transform: translateX(-50%) rotate(0deg);
            }
            to {
                transform: translateX(-50%) rotate(360deg);
            }
        }

        @keyframes rotateMinute {
            from {
                transform: translateX(-50%) rotate(0deg);
            }
            to {
                transform: translateX(-50%) rotate(360deg);
            }
        }
    </style>
</head>
<body>

<div class="clock">
    <div class="hand hour"></div>
    <div class="hand minute"></div>
    <div class="center"></div>
</div>

</body>
</html>
